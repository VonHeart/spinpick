<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SpinPick — Giveaway Wheel</title>
<meta property="og:title" content="SpinPick — Giveaway Wheel"/>
<meta property="og:description" content="Weighted giveaway wheel. Load comments from TikTok, YouTube, Instagram, Twitch & Kick."/>
<meta property="og:type" content="website"/>
<meta name="theme-color" content="#7c5cfc"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--surface3:#22222f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0eff8;--muted:#6e6c85;--muted2:#9997b3;
  --accent:#7c5cfc;--accent2:#a78bfa;--accent-dim:rgba(124,92,252,0.14);--accent-glow:rgba(124,92,252,0.28);
  --success:#22d3a0;--danger:#f43f5e;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 50% at 15% 5%,rgba(124,92,252,.1) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 90%,rgba(34,211,160,.06) 0%,transparent 60%)}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

header{display:flex;align-items:center;justify-content:space-between;padding:18px 36px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;letter-spacing:-.5px}
.logo span{color:var(--accent)}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px}
.saves-btn{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.saves-btn:hover{background:var(--surface3);color:var(--text)}

.main{display:grid;grid-template-columns:380px 1fr;flex:1;min-height:0}
@media(max-width:860px){.main{grid-template-columns:1fr}}

.panel{border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 20px;gap:18px;overflow-y:auto;max-height:calc(100vh - 61px)}
@media(max-width:860px){.panel{max-height:none;border-right:none;border-bottom:1px solid var(--border)}}

.section-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}

.platform-row{display:flex;gap:6px;flex-wrap:wrap}
.plat-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.plat-btn:hover{border-color:var(--border2);color:var(--text)}
.plat-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent2)}
.plat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

input[type=text],textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
input[type=text]{flex:1;padding:0 14px;height:40px;font-size:13px;width:100%}
input[type=text]:focus,textarea:focus{border-color:var(--accent)}
input[type=text]::placeholder,textarea::placeholder{color:var(--muted)}
textarea{width:100%;padding:10px 14px;font-size:13px;resize:vertical;min-height:100px;line-height:1.6}

.row{display:flex;gap:8px}
.btn{height:40px;padding:0 16px;border-radius:10px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);display:flex;align-items:center;gap:6px;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--surface3)}.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.accent:hover:not(:disabled){background:#6b4ee0;border-color:#6b4ee0}
.btn.sm{height:32px;padding:0 12px;font-size:12px;border-radius:8px}
.btn.danger:hover{background:rgba(244,63,94,.12);border-color:var(--danger);color:var(--danger)}

.status-msg{font-size:12px;min-height:16px;color:var(--muted)}
.status-msg.loading{color:var(--accent2)}.status-msg.ok{color:var(--success)}.status-msg.err{color:var(--danger)}

.divider{display:flex;align-items:center;gap:10px;font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.entries-wrap{display:flex;flex-direction:column;gap:5px;overflow-y:auto;max-height:240px;min-height:40px}
.entry{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:7px 10px;transition:border-color .15s}
.entry:hover{border-color:var(--border2)}
.entry-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.entry-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-weight{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--accent-dim);color:var(--accent2);min-width:38px;text-align:center}
.entry-weight.warm{background:rgba(249,115,22,.15);color:#fb923c}
.entry-weight.hot{background:rgba(244,63,94,.15);color:#fb7185}
.entry-actions{display:flex;gap:3px}
.icon-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;transition:all .15s;font-family:'DM Sans',sans-serif}
.icon-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border2)}
.icon-btn.del:hover{background:rgba(244,63,94,.12);color:var(--danger);border-color:rgba(244,63,94,.3)}
.empty-state{text-align:center;padding:20px;color:var(--muted);font-size:13px}
.count-bar{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);padding-top:10px;border-top:1px solid var(--border);flex-shrink:0}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:24px;width:440px;max-width:calc(100vw - 32px);max-height:80vh;display:flex;flex-direction:column;gap:14px}
.modal-header{display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.saves-list{display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.save-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s}
.save-item:hover{border-color:var(--border2)}
.save-info{flex:1;min-width:0}
.save-name{font-size:13px;font-weight:500}
.save-meta{font-size:11px;color:var(--muted);margin-top:1px}

/* Wheel panel */
.wheel-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;gap:24px}
.wheel-outer{position:relative;width:min(400px,calc(100vw - 48px));aspect-ratio:1}
.wheel-glow{position:absolute;inset:-6px;border-radius:50%;box-shadow:0 0 80px var(--accent-glow),0 0 160px rgba(124,92,252,.06);pointer-events:none}
canvas{display:block;width:100%;height:100%}

/* Pointer — tip at left pointing INTO wheel */
.ptr{position:absolute;top:50%;right:-36px;transform:translateY(-50%);filter:drop-shadow(0 2px 8px rgba(0,0,0,.7));pointer-events:none}

.spin-area{display:flex;flex-direction:column;align-items:center;gap:12px;width:min(400px,calc(100vw - 48px))}
.spin-btn{width:100%;height:50px;border-radius:13px;background:var(--accent);border:none;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:.8px;cursor:pointer;transition:all .2s}
.spin-btn:hover:not(:disabled){background:#6b4ee0;transform:translateY(-1px);box-shadow:0 8px 28px var(--accent-glow)}
.spin-btn:disabled{opacity:.3;cursor:not-allowed}
.winner-card{width:100%;padding:14px 18px;border-radius:13px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px;transition:all .3s}
.winner-card.lit{border-color:var(--accent);background:var(--accent-dim);box-shadow:0 0 30px rgba(124,92,252,.12)}
.w-icon{width:36px;height:36px;border-radius:9px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:background .3s}
.winner-card.lit .w-icon{background:rgba(124,92,252,.22)}
.w-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:2px}
.w-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;transition:color .3s}
.winner-card.lit .w-name{color:var(--accent2)}
.w-placeholder{color:var(--muted);font-weight:400;font-size:13px;font-family:'DM Sans',sans-serif}
.bottom-btns{display:flex;gap:8px;width:100%}
.bottom-btns .btn{flex:1;justify-content:center;font-size:12px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<div class="page">

<header>
  <div>
    <div class="logo">Spin<span>Pick</span></div>
    <div class="logo-sub">Giveaway Wheel</div>
  </div>
  <button class="saves-btn" onclick="openModal()">&#128190; Saved Wheels</button>
</header>

<div class="main">

  <!-- LEFT PANEL -->
  <div class="panel">

    <div>
      <div class="section-label">Platform</div>
      <div class="platform-row">
        <button class="plat-btn active" data-p="TikTok" onclick="selectPlatform(this)"><div class="plat-dot" style="background:#ff2d55"></div>TikTok</button>
        <button class="plat-btn" data-p="YouTube" onclick="selectPlatform(this)"><div class="plat-dot" style="background:#ff0000"></div>YouTube</button>
        <button class="plat-btn" data-p="Instagram" onclick="selectPlatform(this)"><div class="plat-dot" style="background:#e1306c"></div>Instagram</button>
        <button class="plat-btn" data-p="Twitch" onclick="selectPlatform(this)"><div class="plat-dot" style="background:#9146ff"></div>Twitch</button>
        <button class="plat-btn" data-p="Kick" onclick="selectPlatform(this)"><div class="plat-dot" style="background:#53fc18"></div>Kick</button>
      </div>
    </div>

    <div>
      <div class="section-label">Load from URL</div>
      <div class="row" style="margin-bottom:8px">
        <input type="text" id="ttUrl" placeholder="Paste TikTok video URL..."/>
        <button class="btn accent" id="fetchBtn" onclick="fetchComments()" style="flex-shrink:0">Load</button>
      </div>
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="divider">or add manually</div>

    <div>
      <div class="section-label">Bulk add names</div>
      <textarea id="bulkInput" placeholder="Paste as many names as you want at once&#10;&#10;Works with:&#10;• One per line&#10;• Comma separated: name1, name2, name3&#10;• Mix of both&#10;• @usernames (@ gets stripped auto)"></textarea>
      <button class="btn accent" onclick="addBulk()" style="width:100%;justify-content:center;margin-top:8px">Add all names</button>
      <div style="font-size:11px;color:var(--muted);margin-top:6px">Duplicates automatically increase that name's weight</div>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;flex:1;min-height:0">
      <div class="section-label">Entries</div>
      <div class="entries-wrap" id="entries"><div class="empty-state">Load comments or add names to start</div></div>
    </div>

    <div class="count-bar">
      <span id="countLabel">No entries</span>
      <button class="btn sm danger" onclick="clearAll()">Clear all</button>
    </div>
  </div>

  <!-- WHEEL PANEL -->
  <div class="wheel-panel">
    <div class="wheel-outer">
      <div class="wheel-glow"></div>
      <canvas id="wc" width="600" height="600"></canvas>
      <!-- Pointer: tip (point) is at LEFT x=0, base at RIGHT — points left into wheel -->
      <svg class="ptr" width="56" height="44" viewBox="0 0 56 44" fill="none">
        <polygon points="0,22 46,6 36,22 46,38" fill="#7c5cfc" stroke="#0a0a0f" stroke-width="2.5" stroke-linejoin="round"/>
        <circle cx="47" cy="22" r="8" fill="#a78bfa" stroke="#0a0a0f" stroke-width="2.5"/>
      </svg>
    </div>

    <div class="spin-area">
      <button class="spin-btn" id="spinBtn" onclick="spin()" disabled>SPIN THE WHEEL</button>
      <div class="winner-card" id="winnerCard">
        <div class="w-icon">&#127942;</div>
        <div>
          <div class="w-label">Winner</div>
          <div class="w-name w-placeholder" id="winnerName">Waiting for spin...</div>
        </div>
      </div>
      <div class="bottom-btns">
        <button class="btn" onclick="removeWinner()">Remove winner</button>
        <button class="btn" onclick="spinAgain()">Spin again</button>
        <button class="btn" onclick="saveWheel()">Save wheel</button>
      </div>
    </div>
  </div>
</div>

<!-- SAVES MODAL -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Saved Wheels</div>
      <button class="icon-btn del" onclick="closeModal()">&#215;</button>
    </div>
    <div class="row">
      <input type="text" id="saveNameInput" placeholder="Name this wheel..." style="flex:1"/>
      <button class="btn accent" onclick="saveWheel()" style="flex-shrink:0">Save current</button>
    </div>
    <div class="saves-list" id="savesList"></div>
  </div>
</div>

<script>
const PALETTE=[
  {fill:"#7c5cfc",text:"#e8e2ff"},{fill:"#22d3a0",text:"#d0fff3"},
  {fill:"#f97316",text:"#fff1e6"},{fill:"#e879a0",text:"#ffe4f0"},
  {fill:"#38bdf8",text:"#e0f7ff"},{fill:"#facc15",text:"#1a1200"},
  {fill:"#4ade80",text:"#052e16"},{fill:"#c084fc",text:"#f3e8ff"},
  {fill:"#fb7185",text:"#fff1f2"},{fill:"#34d399",text:"#022c22"},
  {fill:"#60a5fa",text:"#eff6ff"},{fill:"#f472b6",text:"#fdf2f8"},
];

let entries=[],angle=0,spinning=false,winner=null,platform='TikTok';
const cv=document.getElementById('wc'),ctx=cv.getContext('2d');
const W=600,cx=300,cy=300,R=290;

function saveSession(){try{localStorage.setItem('sp_entries',JSON.stringify(entries));}catch(e){}}
function loadSession(){try{const d=localStorage.getItem('sp_entries');if(d)entries=JSON.parse(d);}catch(e){}}
function getSaves(){try{return JSON.parse(localStorage.getItem('sp_saves')||'{}');}catch{return {};}}

function saveWheel(){
  if(!entries.length){setStatus('Add names first.','err');return;}
  const n=document.getElementById('saveNameInput').value.trim()||
    `Wheel — ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  const s=getSaves();
  s[n]={entries:[...entries.map(e=>({...e}))],savedAt:Date.now()};
  localStorage.setItem('sp_saves',JSON.stringify(s));
  document.getElementById('saveNameInput').value='';
  renderSaves();setStatus(`Saved "${n}"!`,'ok');
}

function loadSave(name){
  const s=getSaves();
  if(s[name]){entries=s[name].entries.map(e=>({...e}));renderAll();closeModal();setStatus(`Loaded "${name}"!`,'ok');}
}

function deleteSave(name){
  const s=getSaves();delete s[name];
  localStorage.setItem('sp_saves',JSON.stringify(s));renderSaves();
}

function renderSaves(){
  const s=getSaves(),keys=Object.keys(s),el=document.getElementById('savesList');
  if(!keys.length){el.innerHTML=`<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">No saved wheels yet</div>`;return;}
  el.innerHTML=keys.map(k=>`
    <div class="save-item" onclick="loadSave(${JSON.stringify(k)})">
      <div class="save-info">
        <div class="save-name">${k}</div>
        <div class="save-meta">${s[k].entries.length} names &middot; ${new Date(s[k].savedAt).toLocaleDateString()}</div>
      </div>
      <button class="icon-btn del" onclick="event.stopPropagation();deleteSave(${JSON.stringify(k)})">&#215;</button>
    </div>`).join('');
}

function openModal(){renderSaves();document.getElementById('modalBg').classList.add('open');}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}

function selectPlatform(btn){
  document.querySelectorAll('.plat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');platform=btn.dataset.p;
  document.getElementById('ttUrl').placeholder=`Paste ${platform} URL...`;
}

function totalWeight(){return entries.reduce((s,e)=>s+e.weight,0);}

function addName(raw){
  const n=raw.trim().replace(/^@/,'');
  if(!n||n.length<1)return false;
  const ex=entries.find(e=>e.name.toLowerCase()===n.toLowerCase());
  if(ex){ex.weight++;}else{entries.push({name:n,weight:1});}
  return true;
}

function addBulk(){
  const raw=document.getElementById('bulkInput').value;
  if(!raw.trim())return;
  const parts=raw.split(/[\n,;]+/).map(s=>s.trim()).filter(Boolean);
  const before=entries.length;
  parts.forEach(p=>addName(p));
  document.getElementById('bulkInput').value='';
  renderAll();saveSession();
  const added=entries.length-before;
  if(added)setStatus(`Added ${added} name${added!==1?'s':''}!`,'ok');
}

function removeName(i){
  if(winner&&entries[i]?.name===winner)winner=null;
  entries.splice(i,1);renderAll();updateWinner();saveSession();
}

function adjustWeight(i,d){
  entries[i].weight=Math.max(1,entries[i].weight+d);renderAll();saveSession();
}

function renderAll(){renderEntries();draw();}

function renderEntries(){
  const el=document.getElementById('entries');
  if(!entries.length){
    el.innerHTML=`<div class="empty-state">Load comments or add names to start</div>`;
    document.getElementById('countLabel').textContent='No entries';
    document.getElementById('spinBtn').disabled=true;return;
  }
  el.innerHTML=entries.map((e,i)=>{
    const c=PALETTE[i%PALETTE.length];
    const wc=e.weight>=5?'hot':e.weight>=3?'warm':'';
    return `<div class="entry">
      <div class="entry-dot" style="background:${c.fill}"></div>
      <div class="entry-name" title="${e.name}">${e.name}</div>
      <div class="entry-weight ${wc}">${e.weight}&times;</div>
      <div class="entry-actions">
        <button class="icon-btn" onclick="adjustWeight(${i},1)">+</button>
        <button class="icon-btn" onclick="adjustWeight(${i},-1)">&minus;</button>
        <button class="icon-btn del" onclick="removeName(${i})">&times;</button>
      </div>
    </div>`;
  }).join('');
  const tw=totalWeight();
  document.getElementById('countLabel').textContent=`${entries.length} name${entries.length!==1?'s':''} &middot; ${tw} slot${tw!==1?'s':''}`;
  document.getElementById('spinBtn').disabled=entries.length<2;
}

function draw(){
  ctx.clearRect(0,0,W,W);
  const total=totalWeight();
  if(!entries.length){
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.fillStyle='#1c1c26';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#6e6c85';ctx.font='500 18px "DM Sans",sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Add names to start',cx,cy);
    drawHub();return;
  }
  let cur=angle;
  entries.forEach((e,i)=>{
    const slice=(e.weight/total)*Math.PI*2,end=cur+slice;
    const c=PALETTE[i%PALETTE.length];
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,cur,end);ctx.closePath();
    ctx.fillStyle=c.fill;ctx.fill();
    ctx.strokeStyle='rgba(10,10,15,.55)';ctx.lineWidth=2;ctx.stroke();
    if(slice>0.06){
      ctx.save();ctx.translate(cx,cy);ctx.rotate(cur+slice/2);
      ctx.textAlign='right';
      const fs=entries.length>24?11:entries.length>14?13:15;
      ctx.font=`600 ${fs}px Syne,sans-serif`;
      const lbl=e.name.length>16?e.name.slice(0,15)+'…':e.name;
      ctx.fillStyle=c.text;ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=4;
      ctx.fillText(lbl,R-14,0);
      if(e.weight>1&&slice>0.18){
        ctx.font=`400 ${fs-2}px "DM Sans",sans-serif`;ctx.globalAlpha=.65;
        ctx.fillText(`${e.weight}×`,R-14,fs+3);ctx.globalAlpha=1;
      }
      ctx.restore();
    }
    cur=end;
  });
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=4;ctx.stroke();
  drawHub();
}

function drawHub(){
  ctx.beginPath();ctx.arc(cx,cy,38,0,Math.PI*2);
  ctx.fillStyle='#0a0a0f';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,22,0,Math.PI*2);ctx.fillStyle='#7c5cfc';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,10,0,Math.PI*2);ctx.fillStyle='#a78bfa';ctx.fill();
}

function setStatus(msg,type=''){
  const el=document.getElementById('statusMsg');
  el.textContent=msg;el.className='status-msg'+(type?' '+type:'');
}

function updateWinner(){
  if(!winner){
    document.getElementById('winnerCard').className='winner-card';
    const n=document.getElementById('winnerName');
    n.className='w-name w-placeholder';n.textContent='Waiting for spin...';
  }
}

async function fetchComments(){
  const url=document.getElementById('ttUrl').value.trim();
  if(!url){setStatus('Paste a URL first.','err');return;}
  const btn=document.getElementById('fetchBtn');
  btn.disabled=true;btn.textContent='...';
  setStatus(`Searching ${platform} comments...`,'loading');
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:`Extract commenter or viewer usernames from a ${platform} post/video/stream. Use web_search to find the content and its comments. Return ONLY a JSON array of username strings (no @ symbol), max 50 unique names. If none found return []. Return ONLY valid JSON array, nothing else.`,
        messages:[{role:'user',content:`Get commenter usernames from this ${platform} URL: ${url}`}]
      })
    });
    const data=await resp.json();
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=text.replace(/```json|```/g,'').trim();
    let parsed=[];
    try{parsed=JSON.parse(clean);}catch{const m=clean.match(/\[[\s\S]*?\]/);if(m)parsed=JSON.parse(m[0]);}
    if(Array.isArray(parsed)&&parsed.length){
      const before=entries.length;
      parsed.forEach(n=>{if(typeof n==='string')addName(n);});
      renderAll();saveSession();
      setStatus(`Loaded ${entries.length-before} names from ${platform}!`,'ok');
    }else{setStatus('No comments found. Try adding manually.','err');}
  }catch(e){setStatus('Error. Check the URL and try again.','err');}
  btn.disabled=false;btn.textContent='Load';
}

function spin(){
  if(spinning||entries.length<2)return;
  spinning=true;winner=null;updateWinner();
  document.getElementById('spinBtn').disabled=true;
  const total=totalWeight();
  const rand=Math.random()*total;
  let cum=0,winIdx=0;
  for(let i=0;i<entries.length;i++){cum+=entries[i].weight;if(rand<cum){winIdx=i;break;}}
  let startA=0;
  for(let i=0;i<winIdx;i++)startA+=entries[i].weight/total*Math.PI*2;
  const midA=startA+entries[winIdx].weight/total*Math.PI*2/2;
  const target=Math.PI*2*(10+Math.random()*4)-(midA)-angle+Math.PI/2;
  const dur=4500+Math.random()*1500,t0=performance.now(),a0=angle;
  function frame(now){
    const p=Math.min((now-t0)/dur,1),e2=1-Math.pow(1-p,4.5);
    angle=a0+target*e2;draw();
    if(p<1){requestAnimationFrame(frame);}
    else{
      spinning=false;winner=entries[winIdx].name;
      document.getElementById('winnerCard').className='winner-card lit';
      const n=document.getElementById('winnerName');
      n.className='w-name';n.textContent=winner;
      document.getElementById('spinBtn').disabled=false;
    }
  }
  requestAnimationFrame(frame);
}

function removeWinner(){
  if(!winner)return;
  const i=entries.findIndex(e=>e.name===winner);
  if(i>-1)entries.splice(i,1);
  winner=null;updateWinner();renderAll();saveSession();
}

function spinAgain(){winner=null;updateWinner();if(entries.length>=2)spin();}

function clearAll(){
  entries=[];winner=null;angle=0;
  renderAll();updateWinner();saveSession();setStatus('');
}

loadSession();renderAll();
</script>
