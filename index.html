<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SpinPick — TikTok Giveaway Wheel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0eff8;
  --muted: #7c7a94;
  --accent: #7c5cfc;
  --accent2: #a78bfa;
  --accent-dim: rgba(124,92,252,0.15);
  --accent-glow: rgba(124,92,252,0.3);
  --success: #22d3a0;
  --warn: #f97316;
  --danger: #f43f5e;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}

/* Ambient glow bg */
body::before{
  content:'';position:fixed;inset:0;
  background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,92,252,0.12) 0%, transparent 60%),
              radial-gradient(ellipse 50% 50% at 80% 80%, rgba(34,211,160,0.07) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* Header */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 40px;border-bottom:1px solid var(--border);
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.logo-sub{font-size:11px;font-weight:400;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.header-badge{
  font-size:11px;font-weight:500;padding:5px 12px;
  border-radius:20px;border:1px solid var(--border2);
  color:var(--muted);letter-spacing:0.5px;
  background:var(--surface);
}

/* Main layout */
.main{
  display:grid;grid-template-columns:360px 1fr;
  gap:0;flex:1;
}
@media(max-width:900px){
  .main{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  header{padding:16px 20px}
}

/* Left panel */
.panel{
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:28px 24px;gap:20px;
  overflow-y:auto;max-height:calc(100vh - 65px);
}
@media(max-width:900px){.panel{max-height:none;border-right:none;border-bottom:1px solid var(--border)}}

.section-label{
  font-family:'Syne',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  margin-bottom:8px;
}

/* TikTok URL input */
.url-group{display:flex;flex-direction:column;gap:8px}
.input-wrap{display:flex;gap:8px}
input[type=text]{
  flex:1;background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;padding:0 14px;height:42px;
  font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;
  outline:none;transition:border-color .2s;
}
input[type=text]:focus{border-color:var(--accent)}
input[type=text]::placeholder{color:var(--muted)}

.btn{
  height:42px;padding:0 18px;border-radius:10px;font-size:13px;
  font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;
  border:1px solid var(--border2);background:var(--surface2);color:var(--text);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:all .15s;
}
.btn:hover{background:var(--surface);border-color:var(--border2)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.accent:hover{background:#6b4ee0;border-color:#6b4ee0}
.btn.danger:hover{background:rgba(244,63,94,0.12);border-color:var(--danger);color:var(--danger)}
.btn.small{height:34px;padding:0 14px;font-size:12px}

.status-msg{
  font-size:12px;color:var(--muted);min-height:16px;
  display:flex;align-items:center;gap:6px;
}
.status-msg.loading{color:var(--accent2)}
.status-msg.ok{color:var(--success)}
.status-msg.err{color:var(--danger)}

.divider{
  display:flex;align-items:center;gap:10px;
  font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* Entries list */
.entries-wrap{display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto;min-height:0}
.entry{
  display:flex;align-items:center;gap:10px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:8px 12px;
  transition:border-color .15s;
}
.entry:hover{border-color:var(--border2)}
.entry-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.entry-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-weight{
  font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;
  background:var(--accent-dim);color:var(--accent2);
  min-width:44px;text-align:center;white-space:nowrap;
}
.entry-weight.warm{background:rgba(249,115,22,0.15);color:#fb923c}
.entry-weight.hot{background:rgba(244,63,94,0.15);color:#fb7185}
.entry-actions{display:flex;gap:4px}
.icon-btn{
  width:26px;height:26px;border-radius:7px;border:1px solid var(--border);
  background:none;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .15s;font-family:'DM Sans',sans-serif;
}
.icon-btn:hover{background:var(--surface);color:var(--text);border-color:var(--border2)}
.icon-btn.del:hover{background:rgba(244,63,94,0.12);color:var(--danger);border-color:rgba(244,63,94,0.3)}

.empty-state{
  text-align:center;padding:32px 16px;color:var(--muted);
  font-size:13px;line-height:1.7;
}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.4}

/* Count bar */
.count-bar{
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--muted);padding:6px 0;
  border-top:1px solid var(--border);
}

/* Right panel — wheel */
.wheel-panel{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;gap:28px;
}
.wheel-outer{
  position:relative;width:min(420px,calc(100vw - 48px));
  aspect-ratio:1;
}
.wheel-shadow{
  position:absolute;inset:-4px;border-radius:50%;
  box-shadow:0 0 60px rgba(124,92,252,0.2),0 0 120px rgba(124,92,252,0.08);
  pointer-events:none;
}
canvas{display:block;width:100%;height:100%;border-radius:50%}

/* Pointer */
.pointer-wrap{
  position:absolute;top:50%;right:-28px;transform:translateY(-50%);
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));
}

/* Spin button */
.spin-area{display:flex;flex-direction:column;align-items:center;gap:14px;width:min(420px,calc(100vw - 48px))}
.spin-btn{
  width:100%;height:52px;border-radius:14px;
  background:var(--accent);border:none;color:#fff;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:700;
  letter-spacing:0.5px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.spin-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom, rgba(255,255,255,0.1), transparent);
  pointer-events:none;
}
.spin-btn:hover{background:#6b4ee0;transform:translateY(-1px);box-shadow:0 8px 24px var(--accent-glow)}
.spin-btn:active{transform:translateY(0)}
.spin-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

/* Winner display */
.winner-card{
  width:100%;padding:16px 24px;border-radius:14px;
  border:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;gap:14px;
  transition:all .3s;
}
.winner-card.lit{
  border-color:var(--accent);background:var(--accent-dim);
  box-shadow:0 0 30px rgba(124,92,252,0.15);
}
.winner-trophy{
  width:38px;height:38px;border-radius:10px;
  background:var(--surface2);display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;transition:background .3s;
}
.winner-card.lit .winner-trophy{background:rgba(124,92,252,0.25)}
.winner-label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.winner-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);transition:color .3s}
.winner-card.lit .winner-name{color:var(--accent2)}
.winner-placeholder{color:var(--muted);font-weight:400;font-size:14px;font-family:'DM Sans',sans-serif}

.bottom-actions{display:flex;gap:8px;width:100%}
.bottom-actions .btn{flex:1;justify-content:center;font-size:12px}
</style>
</head>
<body>
<div class="page">

  <header>
    <div>
      <div class="logo">Spin<span>Pick</span></div>
      <div class="logo-sub">TikTok Giveaway Wheel</div>
    </div>
    <div class="header-badge">Weighted Spin</div>
  </header>

  <div class="main">

    <!-- LEFT PANEL -->
    <div class="panel">

      <div class="url-group">
        <div class="section-label">Load from TikTok</div>
        <div class="input-wrap">
          <input type="text" id="ttUrl" placeholder="Paste TikTok video URL..."/>
          <button class="btn accent" id="fetchBtn" onclick="fetchComments()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v10M4 7l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Load
          </button>
        </div>
        <div class="status-msg" id="statusMsg"></div>
      </div>

      <div class="divider">or add manually</div>

      <div class="url-group">
        <div class="section-label">Add names</div>
        <div class="input-wrap">
          <input type="text" id="manInput" placeholder="@username or name..." onkeydown="if(event.key==='Enter')addManual()"/>
          <button class="btn" onclick="addManual()">Add</button>
        </div>
        <div style="font-size:11px;color:var(--muted)">Duplicate names increase weight automatically</div>
      </div>

      <div style="display:flex;flex-direction:column;gap:8px;flex:1;min-height:0">
        <div class="section-label">Entries</div>
        <div class="entries-wrap" id="entries">
          <div class="empty-state">
            <div class="empty-icon">🎯</div>
            Load TikTok comments or add names above to get started
          </div>
        </div>
      </div>

      <div class="count-bar">
        <span id="countLabel" style="color:var(--muted);font-size:12px">No entries yet</span>
        <button class="btn small danger" onclick="clearAll()">Clear all</button>
      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="wheel-panel">

      <div class="wheel-outer" id="wheelOuter">
        <div class="wheel-shadow"></div>
        <canvas id="wc" width="600" height="600"></canvas>
        <div class="pointer-wrap">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <polygon points="48,24 10,9 18,24 10,39" fill="#7c5cfc" stroke="#0a0a0f" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="48" cy="24" r="7" fill="#a78bfa" stroke="#0a0a0f" stroke-width="2"/>
          </svg>
        </div>
      </div>

      <div class="spin-area">
        <button class="spin-btn" id="spinBtn" onclick="spin()" disabled>SPIN THE WHEEL</button>

        <div class="winner-card" id="winnerCard">
          <div class="winner-trophy">🏆</div>
          <div>
            <div class="winner-label">Winner</div>
            <div class="winner-name winner-placeholder" id="winnerName">Waiting for spin...</div>
          </div>
        </div>

        <div class="bottom-actions">
          <button class="btn" onclick="removeWinner()">Remove winner</button>
          <button class="btn" onclick="spinAgain()">Spin again</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const PALETTE=[
  {fill:"#7c5cfc",text:"#e8e2ff"},
  {fill:"#22d3a0",text:"#d0fff3"},
  {fill:"#f97316",text:"#fff1e6"},
  {fill:"#e879a0",text:"#ffe4f0"},
  {fill:"#38bdf8",text:"#e0f7ff"},
  {fill:"#facc15",text:"#1a1200"},
  {fill:"#4ade80",text:"#052e16"},
  {fill:"#c084fc",text:"#f3e8ff"},
  {fill:"#fb7185",text:"#fff1f2"},
  {fill:"#34d399",text:"#022c22"},
  {fill:"#60a5fa",text:"#eff6ff"},
  {fill:"#f472b6",text:"#fdf2f8"},
];

let entries=[], angle=0, spinning=false, winner=null;
const cv=document.getElementById('wc');
const ctx=cv.getContext('2d');
const W=600, cx=300, cy=300, R=290;

function totalWeight(){return entries.reduce((s,e)=>s+e.weight,0)}

function addName(raw){
  const n=raw.trim().replace(/^@/,'');
  if(!n)return;
  const ex=entries.find(e=>e.name.toLowerCase()===n.toLowerCase());
  if(ex){ex.weight++;}
  else{entries.push({name:n,weight:1})}
  renderEntries();draw();
}

function removeName(i){
  if(winner&&entries[i]?.name===winner)winner=null;
  entries.splice(i,1);
  renderEntries();draw();updateWinner();
}

function adjustWeight(i,d){
  entries[i].weight=Math.max(1,entries[i].weight+d);
  renderEntries();draw();
}

function addManual(){
  const v=document.getElementById('manInput');
  addName(v.value);v.value='';
}

function renderEntries(){
  const el=document.getElementById('entries');
  if(!entries.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🎯</div>Load TikTok comments or add names above to get started</div>`;
    document.getElementById('countLabel').textContent='No entries yet';
    document.getElementById('spinBtn').disabled=true;
    return;
  }
  el.innerHTML=entries.map((e,i)=>{
    const c=PALETTE[i%PALETTE.length];
    const wClass=e.weight>=5?'hot':e.weight>=3?'warm':'';
    return `<div class="entry">
      <div class="entry-color" style="background:${c.fill}"></div>
      <div class="entry-name" title="${e.name}">${e.name}</div>
      <div class="entry-weight ${wClass}">${e.weight}×</div>
      <div class="entry-actions">
        <button class="icon-btn" onclick="adjustWeight(${i},1)" title="Increase weight">+</button>
        <button class="icon-btn" onclick="adjustWeight(${i},-1)" title="Decrease weight">−</button>
        <button class="icon-btn del" onclick="removeName(${i})" title="Remove">×</button>
      </div>
    </div>`;
  }).join('');
  const tw=totalWeight();
  document.getElementById('countLabel').textContent=`${entries.length} name${entries.length!==1?'s':''} · ${tw} total slot${tw!==1?'s':''}`;
  document.getElementById('spinBtn').disabled=entries.length<2;
}

function draw(){
  ctx.clearRect(0,0,W,W);
  const total=totalWeight();
  if(!entries.length){
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.fillStyle='#1c1c26';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#7c7a94';ctx.font='500 18px DM Sans,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Add names to start',cx,cy);
    drawHub();return;
  }
  let cur=angle;
  entries.forEach((e,i)=>{
    const slice=(e.weight/total)*Math.PI*2, end=cur+slice;
    const c=PALETTE[i%PALETTE.length];
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,cur,end);ctx.closePath();
    ctx.fillStyle=c.fill;ctx.fill();
    ctx.strokeStyle='rgba(10,10,15,0.6)';ctx.lineWidth=2;ctx.stroke();
    if(slice>0.06){
      ctx.save();ctx.translate(cx,cy);ctx.rotate(cur+slice/2);
      ctx.textAlign='right';
      const fs=entries.length>24?11:entries.length>14?13:15;
      ctx.font=`600 ${fs}px Syne,sans-serif`;
      const lbl=e.name.length>16?e.name.slice(0,15)+'…':e.name;
      ctx.fillStyle=c.text;
      ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=4;
      ctx.fillText(lbl,R-14,0);
      if(e.weight>1&&slice>0.18){
        ctx.font=`400 ${fs-2}px DM Sans,sans-serif`;
        ctx.globalAlpha=0.7;
        ctx.fillText(`${e.weight}×`,R-14,fs+3);
        ctx.globalAlpha=1;
      }
      ctx.restore();
    }
    cur=end;
  });
  // Outer ring
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=4;ctx.stroke();
  drawHub();
}

function drawHub(){
  // Outer hub ring
  ctx.beginPath();ctx.arc(cx,cy,36,0,Math.PI*2);
  ctx.fillStyle='#0a0a0f';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=2;ctx.stroke();
  // Inner hub
  ctx.beginPath();ctx.arc(cx,cy,22,0,Math.PI*2);
  ctx.fillStyle='#7c5cfc';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,10,0,Math.PI*2);
  ctx.fillStyle='#a78bfa';ctx.fill();
}

function setStatus(msg,type=''){
  const el=document.getElementById('statusMsg');
  el.textContent=msg;
  el.className='status-msg'+(type?' '+type:'');
}

function updateWinner(){
  const card=document.getElementById('winnerCard');
  const name=document.getElementById('winnerName');
  if(!winner){
    card.className='winner-card';
    name.className='winner-name winner-placeholder';
    name.textContent='Waiting for spin...';
  }
}

async function fetchComments(){
  const url=document.getElementById('ttUrl').value.trim();
  if(!url){setStatus('Paste a TikTok URL first.','err');return;}
  const btn=document.getElementById('fetchBtn');
  btn.disabled=true;btn.textContent='Loading...';
  setStatus('Searching for comments...','loading');
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:`Extract TikTok commenter usernames. Use web_search to find the video and its comments. Return ONLY a JSON array of username strings (no @ symbol), up to 50. If none found return []. Return ONLY the JSON array, nothing else.`,
        messages:[{role:'user',content:`Get commenter usernames from this TikTok: ${url}`}]
      })
    });
    const data=await resp.json();
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=text.replace(/```json|```/g,'').trim();
    let parsed=[];
    try{parsed=JSON.parse(clean);}catch{
      const m=clean.match(/\[[\s\S]*?\]/);if(m)parsed=JSON.parse(m[0]);
    }
    if(Array.isArray(parsed)&&parsed.length){
      const before=entries.length;
      parsed.forEach(n=>{if(typeof n==='string')addName(n);});
      const added=entries.length-before;
      setStatus(`Added ${added} commenter${added!==1?'s':''}!`,'ok');
    } else {
      setStatus('No comments found. Try adding names manually.','err');
    }
  }catch(e){setStatus('Error fetching. Check your URL.','err');}
  btn.disabled=false;
  btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v10M4 7l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Load`;
}

function spin(){
  if(spinning||entries.length<2)return;
  spinning=true;winner=null;
  updateWinner();
  document.getElementById('spinBtn').disabled=true;
  const total=totalWeight();
  const rand=Math.random()*total;
  let cum=0,winIdx=0;
  for(let i=0;i<entries.length;i++){cum+=entries[i].weight;if(rand<cum){winIdx=i;break;}}
  let startAngle=0;
  for(let i=0;i<winIdx;i++)startAngle+=entries[i].weight/total*Math.PI*2;
  const midAngle=startAngle+entries[winIdx].weight/total*Math.PI*2/2;
  const spins=Math.PI*2*(10+Math.random()*3);
  const target=spins-(midAngle)-angle+Math.PI/2;
  const dur=4500+Math.random()*1500,t0=performance.now(),a0=angle;
  function frame(now){
    const p=Math.min((now-t0)/dur,1),ease=1-Math.pow(1-p,4.5);
    angle=a0+target*ease;draw();
    if(p<1){requestAnimationFrame(frame);}
    else{
      spinning=false;winner=entries[winIdx].name;
      const card=document.getElementById('winnerCard');
      const name=document.getElementById('winnerName');
      card.className='winner-card lit';
      name.className='winner-name';
      name.textContent=winner;
      document.getElementById('spinBtn').disabled=false;
    }
  }
  requestAnimationFrame(frame);
}

function removeWinner(){
  if(!winner)return;
  const i=entries.findIndex(e=>e.name===winner);
  if(i>-1)entries.splice(i,1);
  winner=null;updateWinner();renderEntries();draw();
}

function spinAgain(){
  winner=null;updateWinner();
  if(entries.length>=2)spin();
}

function clearAll(){
  entries=[];winner=null;angle=0;
  renderEntries();draw();updateWinner();
  setStatus('');
}

draw();
</script>
</body>
</html>
